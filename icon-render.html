<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="noindex" name="robots"/>
<meta content="サイトアイコンをブラウザレンダリングでPNG化するための作業用ページです。" name="description"/>
<title>Icon Render</title>
<style>
      html,
      body {
        width: 512px;
        height: 512px;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      img {
        display: block;
        width: 512px;
        height: 512px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
      }
    </style>
</head>
<body>
<h1 class="sr-only">サイトアイコンレンダリング</h1>
<img alt="サイトアイコン" src="favicon.svg"/>
</body>
</html>
